name: iOS Build & Submit (free local via macOS runner)

# 设计哲学：
#  - 用 `eas build --platform ios --local` 在 GitHub macOS runner 上跑构建。
#  - Expo 官方文档明确：local builds 不计入 EAS cloud quota。
#  - GitHub Actions 私有 repo 提供每月 2000 分钟 macOS runner 免费额度。
#  - macos-15 runner 镜像本身已经预装 Xcode + CocoaPods + Fastlane + Ruby。
#    所以这个 workflow 只需要装 Node 和 eas-cli，剩下全靠 image 自带。
#
# 必需的 secrets （在 GitHub repo Settings → Secrets and variables → Actions）：
#  - EXPO_TOKEN: 在 https://expo.dev/accounts/lisumchen/settings/access-tokens
#                 生成一个新 token。

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      submit:
        description: 'Submit to TestFlight after build'
        required: true
        default: true
        type: boolean
      clear_cache:
        description: 'Clear EAS build cache (slow but clean)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS IPA on macOS runner
    # macos-latest 跟踪 GitHub Actions 提供的最新 macOS（2026 年是 macos-26 / Tahoe）。
    # 之前用 macos-15 默认 Xcode 16.x，自带 iOS 18.5 SDK → 上传 TestFlight 被 Apple 拒绝：
    #   "All iOS and iPadOS apps must be built with the iOS 26 SDK or later"
    # 切到 macos-latest + 显式选 Xcode 26 可以拿到 iOS 26 SDK。
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # SENTRY_AUTH_TOKEN: 用于 @sentry/react-native 插件在 build 结束时
      # 上传 sourcemap + dSYM 到 Sentry。EAS Cloud builds 可以从 EAS server
      # 端读 SECRET 类型的 env var，但 `eas build --local` 只能读 Plain /
      # Sensitive 类型 —— SECRET 故意被禁。所以我们在 GitHub Secrets 里独立
      # 存一份，通过 workflow env 注入构建上下文。
      # 如果 secret 不存在，build 末尾 sentry-cli 会报：
      #   "Auth token is required for this request"
      # 解决：在 https://postervia.sentry.io/settings/account/api/auth-tokens/
      # 创建一个新 token（scopes: org:read + project:releases + project:write）
      # 然后在 https://github.com/Yinchaochen/Novaku/settings/secrets/actions
      # 加名为 SENTRY_AUTH_TOKEN 的 secret。
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      # Sentry dSYM 上传是 archive 完成后的一个 script phase。Sentry 服务端偶尔
      # 抽风返回 5xx（实测 Build #21 跑 16 分钟到 archive 全绿，最后挂在 sentry-cli
      # 报 "API request failed - internal server error (http status: 500)"）。
      # SENTRY_ALLOW_FAILURE=true 让 sentry-cli 把上传错误降级为 warning 并 exit 0，
      # IPA 还是能正常产出 + 上 TestFlight。代价：这次 build 在 Sentry 里的
      # crash symbolication 可能不完整，可以事后手动 sentry-cli debug-files upload。
      SENTRY_ALLOW_FAILURE: 'true'
      CI: 1
      npm_config_progress: 'false'
      npm_config_audit: 'false'
      npm_config_fund: 'false'

    steps:
      # ── 1. 检出仓库 ──────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. 安装 Node 20 LTS ──────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ── 3a. 列出所有可用 Xcode 版本（debug） ────────────────────────
      - name: List available Xcode versions
        run: |
          echo "=== /Applications 下所有 Xcode*.app ==="
          ls -la /Applications | grep -i Xcode || echo "(none)"
          echo ""
          echo "=== 当前 active Xcode ==="
          xcode-select -p
          xcodebuild -version

      # ── 3b. 选择 Xcode 26（含 iOS 26 SDK）─────────────────────────
      # Apple 2026 起要求上传 ASC 的 app 必须用 iOS 26 SDK 编译。
      # GitHub macOS runner 通常多 Xcode 并存，default 不一定是最新。
      # 主动找 Xcode 26 / Xcode latest 并切到它。
      - name: Select Xcode with iOS 26 SDK
        run: |
          set -e
          XCODE_PATH=""
          # 优先：Xcode_26.x（GA 版本）
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode-beta.app /Applications/Xcode_latest.app /Applications/Xcode.app; do
            if [ -d "$candidate" ]; then
              # 检查这个 Xcode 是否有 iOS 26 SDK
              SDKS=$(xcodebuild -showsdks 2>/dev/null | grep -i "iphoneos26" || echo "")
              # 临时切到 candidate 看 SDK
              if sudo xcode-select -switch "$candidate" 2>/dev/null; then
                ACTUAL_SDKS=$(xcodebuild -showsdks 2>/dev/null | grep -i "iphoneos" || echo "(none)")
                echo "Candidate: $candidate"
                echo "  SDKs: $ACTUAL_SDKS"
                if echo "$ACTUAL_SDKS" | grep -qi "iphoneos26"; then
                  echo "  ✅ has iOS 26 SDK — using this Xcode"
                  XCODE_PATH="$candidate"
                  break
                fi
              fi
            fi
          done

          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode with iOS 26 SDK found on this runner."
            echo "::error::Apple requires iOS 26 SDK for App Store submission since 2026."
            echo "::error::Available Xcode versions:"
            ls /Applications | grep -i Xcode
            echo "::error::Available iOS SDKs (using current Xcode):"
            xcodebuild -showsdks | grep iphoneos
            exit 1
          fi

          echo "=== Final Xcode selection ==="
          xcode-select -p
          xcodebuild -version
          echo "=== iOS SDKs ==="
          xcodebuild -showsdks | grep iphoneos

      # ── 3c. 验证预装的 CocoaPods + Fastlane + Ruby ─────────────────
      - name: Verify preinstalled iOS toolchain
        run: |
          echo "=== CocoaPods ==="
          pod --version
          echo ""
          echo "=== Fastlane ==="
          fastlane --version | head -3
          echo ""
          echo "=== Ruby (system) ==="
          ruby --version
          echo "Ruby bin path: $(which ruby)"
          echo "Fastlane path: $(which fastlane)"

      # ── 4. 装 eas-cli 全局 ──────────────────────────────────────────
      - name: Install eas-cli
        run: |
          npm install -g eas-cli@latest
          eas --version

      # ── 5. 验证 EAS 认证 ────────────────────────────────────────────
      - name: Verify EAS auth
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::EXPO_TOKEN secret missing. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          eas whoami

      # ── 5b. 验证 Sentry auth token（必须，否则 build 末尾上传 sourcemap 时失败）
      - name: Verify SENTRY_AUTH_TOKEN
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN}" ]; then
            echo "::error::SENTRY_AUTH_TOKEN secret missing."
            echo "::error::Get one at https://postervia.sentry.io/settings/account/api/auth-tokens/"
            echo "::error::Scopes needed: org:read + project:releases + project:write"
            echo "::error::Add as 'SENTRY_AUTH_TOKEN' (exact name, all caps) at:"
            echo "::error::https://github.com/Yinchaochen/Novaku/settings/secrets/actions"
            exit 1
          fi
          echo "SENTRY_AUTH_TOKEN is set (length ${#SENTRY_AUTH_TOKEN})"

      # ── 6. 装 npm 依赖（patch-package 通过 postinstall 自动应用）─────
      - name: Install npm dependencies
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          echo "--- patches/ 内容 ---"
          ls -la patches/

      # ── 7. 跑 EAS Build (local mode) ─────────────────────────────────
      - name: Build iOS IPA (eas build --local)
        run: |
          set -e
          BUILD_FLAGS="--platform ios --profile ${{ github.event.inputs.profile }} --local --non-interactive --output ./postervia.ipa"
          if [ "${{ github.event.inputs.clear_cache }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --clear-cache"
          fi
          echo "Running: eas build $BUILD_FLAGS"
          eas build $BUILD_FLAGS

      # ── 8. 上传 IPA 作为 workflow artifact ──────────────────────────
      - name: Upload IPA as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postervia-ios-ipa-${{ github.run_number }}
          path: ./postervia.ipa
          retention-days: 7
          if-no-files-found: warn

      # ── 9. 提交到 TestFlight (eas submit) ───────────────────────────
      - name: Submit to TestFlight
        if: ${{ github.event.inputs.submit == 'true' && success() }}
        run: |
          set -e
          eas submit --platform ios --path ./postervia.ipa --non-interactive

      # ── 10. 报告下一步 ───────────────────────────────────────────────
      - name: Print next steps
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "Build run #${{ github.run_number }} ended (status: ${{ job.status }})."
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ IPA built + uploaded as artifact."
            if [ "${{ github.event.inputs.submit }}" = "true" ]; then
              echo "✅ Submitted to TestFlight. Apple processing ~5-15 min."
            fi
          else
            echo "❌ Build failed. Check the failed step's logs above."
          fi
          echo "═══════════════════════════════════════════════════════════"

name: iOS Build & Submit (free local via macOS runner)

# 设计哲学：
#  - 用 `eas build --platform ios --local` 在 GitHub macOS runner 上跑构建。
#  - Expo 官方文档明确：local builds 不计入 EAS cloud quota。
#  - GitHub Actions 私有 repo 提供每月 2000 分钟 macOS runner 免费额度。
#  - macos-15 runner 镜像本身已经预装 Xcode + CocoaPods + Fastlane + Ruby。
#    所以这个 workflow 只需要装 Node 和 eas-cli，剩下全靠 image 自带。
#
# 必需的 secrets （在 GitHub repo Settings → Secrets and variables → Actions）：
#  - EXPO_TOKEN: 在 https://expo.dev/accounts/lisumchen/settings/access-tokens
#                 生成一个新 token。

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      submit:
        description: 'Submit to TestFlight after build'
        required: true
        default: true
        type: boolean
      clear_cache:
        description: 'Clear EAS build cache (slow but clean)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS IPA on macOS runner
    runs-on: macos-15
    timeout-minutes: 75
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      CI: 1
      npm_config_progress: 'false'
      npm_config_audit: 'false'
      npm_config_fund: 'false'

    steps:
      # ── 1. 检出仓库 ──────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. 安装 Node 20 LTS ──────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ── 3. 验证预装的 iOS 工具链（macos-15 自带 Xcode + Pod + Fastlane）
      # 之前版本的 workflow 试图安装 Ruby 3.3，反而把 PATH 改了让 fastlane
      # 找不到。系统已经有 Xcode + CocoaPods + Fastlane 预装在 image 里，
      # 直接用。
      - name: Verify preinstalled iOS toolchain
        run: |
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== CocoaPods ==="
          pod --version
          echo ""
          echo "=== Fastlane ==="
          fastlane --version | head -3
          echo ""
          echo "=== Ruby (system) ==="
          ruby --version
          echo "Ruby bin path: $(which ruby)"
          echo "Fastlane path: $(which fastlane)"

      # ── 4. 装 eas-cli 全局 ──────────────────────────────────────────
      - name: Install eas-cli
        run: |
          npm install -g eas-cli@latest
          eas --version

      # ── 5. 验证 EAS 认证 ────────────────────────────────────────────
      - name: Verify EAS auth
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::EXPO_TOKEN secret missing. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          eas whoami

      # ── 6. 装 npm 依赖（patch-package 通过 postinstall 自动应用）─────
      - name: Install npm dependencies
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          echo "--- patches/ 内容 ---"
          ls -la patches/

      # ── 7. 跑 EAS Build (local mode) ─────────────────────────────────
      - name: Build iOS IPA (eas build --local)
        run: |
          set -e
          BUILD_FLAGS="--platform ios --profile ${{ github.event.inputs.profile }} --local --non-interactive --output ./postervia.ipa"
          if [ "${{ github.event.inputs.clear_cache }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --clear-cache"
          fi
          echo "Running: eas build $BUILD_FLAGS"
          eas build $BUILD_FLAGS

      # ── 8. 上传 IPA 作为 workflow artifact ──────────────────────────
      - name: Upload IPA as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postervia-ios-ipa-${{ github.run_number }}
          path: ./postervia.ipa
          retention-days: 7
          if-no-files-found: warn

      # ── 9. 提交到 TestFlight (eas submit) ───────────────────────────
      - name: Submit to TestFlight
        if: ${{ github.event.inputs.submit == 'true' && success() }}
        run: |
          set -e
          eas submit --platform ios --path ./postervia.ipa --non-interactive

      # ── 10. 报告下一步 ───────────────────────────────────────────────
      - name: Print next steps
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "Build run #${{ github.run_number }} ended (status: ${{ job.status }})."
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ IPA built + uploaded as artifact."
            if [ "${{ github.event.inputs.submit }}" = "true" ]; then
              echo "✅ Submitted to TestFlight. Apple processing ~5-15 min."
            fi
          else
            echo "❌ Build failed. Check the failed step's logs above."
          fi
          echo "═══════════════════════════════════════════════════════════"

title = "Novaku App Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Novaku app allowlist"
paths = [
  '''node_modules/''',
  '''(^|/)tests?/''',
  '''\.example$''',
  '''\.md$''',
  '''\.map$''',
]
regexes = [
  '''EXAMPLE''',
  '''placeholder''',
  '''your[_-]?(key|secret|token|password)''',
  '''<[A-Z_]+>''',
]
